@if(isAddingTask){
<app-add-task [userId]="user().id" (closeAddTaskDialog)="isAddingTask = false" />
}

<section>
  <header>
    <h2>{{ user().name }}'s Tasks</h2>
    <menu>
      <button (click)="onClickAddTask()">Add Task</button>
    </menu>
  </header>

  <ul>
    @for (task of selectedUserTasks; track task.id) {
    <li><app-task [task]="task" /></li>
    }
  </ul>
</section>
